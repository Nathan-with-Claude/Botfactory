spring:
  application:
    name: svc-supervision
  profiles:
    active: dev

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:h2:mem:supervision_dev;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    database-platform: org.hibernate.dialect.H2Dialect

server:
  port: 8082

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${SUPERVISION_DB_URL:jdbc:postgresql://localhost:5432/supervision}
    username: ${SUPERVISION_DB_USER:supervision}
    password: ${SUPERVISION_DB_PASSWORD:supervision}
  jpa:
    hibernate:
      ddl-auto: validate
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  # OAuth2 Resource Server — SSO corporate Docaposte (US-020)
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${SSO_ISSUER_URI:https://sso.docaposte.fr/realms/docupost}

server:
  port: 8082
