spring:
  application:
    name: svc-tournee
  profiles:
    active: dev
  # US-059 : limite upload photo (base64 JSON) — augmentée pour les photos ~1 Mo
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB

server:
  port: 8081

---
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:h2:mem:docupost-tournee;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

logging:
  level:
    com.docapost: DEBUG
    org.springframework.security: DEBUG

---
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${POSTGRES_URL}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    hikari:
      maximum-pool-size: 3
      minimum-idle: 1

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # OAuth2 Resource Server — SSO corporate Docaposte (US-019/020)
  # jwk-set-uri (lazy) au lieu de issuer-uri : évite la connexion Keycloak au démarrage
  # si Keycloak n'est pas encore déployé. À remplacer par issuer-uri quand Keycloak est opérationnel.
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${SSO_JWK_SET_URI:${SSO_ISSUER_URI:https://sso.docaposte.fr/realms/docupost}/protocol/openid-connect/certs}
